name: Update Witness Slip Data

on:
  schedule:
    - cron: '0 14 * * *'   # daily at 2pm UTC (9am CT) — after OpenStates updates
  workflow_dispatch:         # allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run notifier — write bills.json
        env:
          USER_NAME: ${{ secrets.USER_NAME }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_ORG: ${{ secrets.USER_ORG }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python witness_slip_notifier.py --mode github-action --sample
          python3 - <<'PYEOF'
          import json, datetime, pathlib
          src = pathlib.Path('witness_slip_notifications.json')
          bills = json.loads(src.read_text()) if src.exists() else []
          out = {
              "generated_at": datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
              "source_note": "Bill data sourced from govbot-openstates-scrapers/il-legislation (OpenStates). Updated once daily.",
              "bills": bills
          }
          pathlib.Path('docs/data').mkdir(parents=True, exist_ok=True)
          pathlib.Path('docs/data/bills.json').write_text(json.dumps(out, indent=2, ensure_ascii=False))
          print(f'Wrote docs/data/bills.json ({len(bills)} bills)')
          PYEOF

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/data/bills.json
          git diff --staged --quiet || git commit -m "chore: update bills.json [skip ci]"
          git push
