name: Update Witness Slip Data

on:
  schedule:
    - cron: '0 12 * * *'   # daily at noon UTC
  workflow_dispatch:         # allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run notifier — write bills.json
        env:
          USER_NAME: ${{ secrets.USER_NAME }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_ORG: ${{ secrets.USER_ORG }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python witness_slip_notifier.py --mode github-action --sample
          python - <<'PYEOF'
          import json, datetime
          with open('witness_slip_notifications.json') as f:
              bills = json.load(f)
          out = {"generated_at": datetime.datetime.utcnow().isoformat()+"Z", "bills": bills}
          with open('docs/data/bills.json','w') as f:
              json.dump(out, f, indent=2)
          PYEOF

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/bills.json
          git diff --staged --quiet || git commit -m "chore: update bills.json [skip ci]"
          git push
